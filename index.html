<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POM 聚甲醛知识库</title>
<script src="marked.min.js"></script>
<style>
:root {
  --bg-primary: #f8f9fa;
  --bg-sidebar: #1e293b;
  --bg-sidebar-hover: #334155;
  --bg-sidebar-active: #0f172a;
  --bg-card: #ffffff;
  --text-primary: #1e293b;
  --text-secondary: #64748b;
  --text-sidebar: #cbd5e1;
  --text-sidebar-active: #f1f5f9;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg-primary); color: var(--text-primary);
  height: 100vh; display: flex; overflow: hidden;
}
.sidebar {
  width: 300px; min-width: 300px; background: var(--bg-sidebar);
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.sidebar-header {
  padding: 20px 18px 14px; border-bottom: 1px solid rgba(255,255,255,.08);
  cursor: pointer; transition: background .15s;
}
.sidebar-header:hover { background: var(--bg-sidebar-hover); }
.sidebar-header h1 { color: #fff; font-size: 17px; font-weight: 700; letter-spacing: .5px; }
.sidebar-header .sub { color: var(--text-sidebar); font-size: 12px; margin-top: 4px; opacity: .7; }
.search-box { padding: 10px 14px; }
.search-box input {
  width: 100%; padding: 8px 12px; border-radius: 6px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06); color: #fff; font-size: 13px; outline: none; transition: all .2s;
}
.search-box input::placeholder { color: rgba(255,255,255,.35); }
.search-box input:focus { background: rgba(255,255,255,.1); border-color: var(--accent); }
.file-list { flex: 1; overflow-y: auto; padding: 6px 0; }
.file-list::-webkit-scrollbar { width: 4px; }
.file-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }
.cat-group { margin-bottom: 4px; }
.cat-header {
  display: flex; align-items: center; padding: 8px 16px;
  color: var(--text-sidebar); font-size: 13px; font-weight: 600;
  cursor: pointer; user-select: none; transition: background .15s;
}
.cat-header:hover { background: var(--bg-sidebar-hover); }
.cat-header .icon { margin-right: 8px; font-size: 15px; }
.cat-header .arrow { margin-left: auto; font-size: 10px; transition: transform .2s; opacity: .5; }
.cat-header.open .arrow { transform: rotate(90deg); }
.cat-header .count {
  margin-left: 6px; background: rgba(255,255,255,.1); color: rgba(255,255,255,.5);
  font-size: 11px; padding: 1px 6px; border-radius: 10px; font-weight: 400;
}
.cat-header .lock-badge { margin-left: 4px; font-size: 11px; opacity: .6; }
.cat-files { display: none; }
.cat-files.open { display: block; }
.file-item {
  display: flex; align-items: center; padding: 7px 16px 7px 40px;
  color: var(--text-sidebar); font-size: 13px; cursor: pointer;
  transition: all .15s; border-left: 3px solid transparent;
}
.file-item:hover { background: var(--bg-sidebar-hover); color: var(--text-sidebar-active); }
.file-item.active { background: var(--bg-sidebar-active); color: #fff; border-left-color: var(--accent); }
.file-item .dot { width: 6px; height: 6px; border-radius: 50%; background: #475569; margin-right: 10px; flex-shrink: 0; }
.file-item.active .dot { background: var(--accent); }
.file-item .ext-badge {
  margin-left: auto; font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: rgba(255,255,255,.06); color: rgba(255,255,255,.35); text-transform: uppercase;
}
.file-item .ext-badge.pdf { background: rgba(239,68,68,.2); color: #f87171; }
.file-item .ext-badge.link { background: rgba(34,197,94,.15); color: #4ade80; }
.file-item .ext-badge.form { background: rgba(245,158,11,.15); color: #fbbf24; }
.sub-group { margin-left: 12px; }
.sub-header { display: flex; align-items: center; padding: 6px 16px 6px 30px; color: var(--text-sidebar); font-size: 13px; font-weight: 500; cursor: pointer; user-select: none; transition: background .15s; }
.sub-header:hover { background: var(--bg-sidebar-hover); }
.sub-header .sub-icon { margin-right: 7px; font-size: 13px; opacity: .7; }
.sub-header .arrow { margin-left: auto; font-size: 10px; transition: transform .2s; opacity: .4; }
.sub-header.open .arrow { transform: rotate(90deg); }
.sub-files { display: none; }
.sub-files.open { display: block; }
.group-wrap { margin-left: 10px; }
.group-header { display: flex; align-items: center; padding: 5px 14px 5px 30px; color: rgba(255,255,255,.45); font-size: 12px; font-weight: 500; cursor: pointer; user-select: none; transition: background .15s; }
.group-header:hover { background: var(--bg-sidebar-hover); color: var(--text-sidebar); }
.group-header .g-icon { margin-right: 6px; font-size: 11px; }
.group-header .arrow { margin-left: auto; font-size: 9px; transition: transform .2s; opacity: .4; }
.group-header.open .arrow { transform: rotate(90deg); }
.group-files { display: none; }
.group-files.open { display: block; }
.file-item.sub-file { padding-left: 56px; }
.file-item.group-file { padding-left: 68px; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  display: flex; align-items: center; padding: 12px 28px;
  background: var(--bg-card); border-bottom: 1px solid var(--border); min-height: 52px;
}
.breadcrumb { font-size: 13px; color: var(--text-secondary); }
.breadcrumb span { color: var(--text-primary); font-weight: 600; }
.topbar-actions { margin-left: auto; display: flex; gap: 8px; }
.topbar-actions button {
  padding: 5px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary); font-size: 12px; cursor: pointer; transition: all .15s;
}
.topbar-actions button:hover { border-color: var(--accent); color: var(--accent); }
.content-wrap { flex: 1; overflow-y: auto; padding: 28px 36px 60px; }
.welcome { max-width: 760px; margin: 30px auto; text-align: center; }
.welcome h2 { font-size: 26px; font-weight: 700; margin-bottom: 12px; }
.welcome p { color: var(--text-secondary); font-size: 15px; line-height: 1.8; }
.welcome .stats { display: flex; justify-content: center; gap: 32px; margin-top: 28px; }
.welcome .stat-item { text-align: center; }
.welcome .stat-num { font-size: 32px; font-weight: 700; color: var(--accent); }
.welcome .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
/* 首页搜索 */
.home-search { max-width: 520px; margin: 28px auto 0; }
.search-tabs { display: flex; justify-content: center; margin-bottom: 10px; }
.search-tab {
  padding: 5px 20px; border: 1px solid var(--border); background: var(--bg-card);
  font-size: 13px; cursor: pointer; transition: all .15s; color: var(--text-secondary);
}
.search-tab:first-child { border-radius: 6px 0 0 6px; }
.search-tab:last-child { border-radius: 0 6px 6px 0; border-left: none; }
.search-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.home-search-row { position: relative; display: flex; gap: 8px; }
.home-search-row input {
  flex: 1; padding: 12px 18px 12px 42px; border-radius: 10px;
  border: 2px solid var(--border); background: var(--bg-card); font-size: 15px;
  outline: none; transition: all .2s; color: var(--text-primary);
}
.home-search-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
.home-search-row .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-secondary); pointer-events: none; }
.web-search-btn {
  padding: 10px 22px; background: var(--accent); color: #fff; border: none; border-radius: 10px;
  font-size: 14px; cursor: pointer; transition: background .15s; white-space: nowrap; display: none;
}
.web-search-btn:hover { background: #1d4ed8; }
.web-search-btn.show { display: block; }
.search-results { max-width: 760px; margin: 20px auto 0; text-align: left; }
.search-results .sr-title { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
.sr-item {
  display: flex; align-items: center; padding: 10px 16px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px;
  cursor: pointer; transition: all .15s;
}
.sr-item:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,.06); }
.sr-item .sr-icon { font-size: 16px; margin-right: 12px; }
.sr-item .sr-name { font-size: 14px; font-weight: 600; }
.sr-item .sr-cat { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
.sr-item .sr-lock { font-size: 12px; margin-left: 8px; }
/* 分类卡片 */
.welcome .categories-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 28px; }
.welcome .cat-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px 12px; cursor: pointer; transition: all .2s; position: relative;
}
.welcome .cat-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(37,99,235,.08); }
.welcome .cat-card .cat-icon { font-size: 24px; }
.welcome .cat-card .cat-name { font-size: 13px; font-weight: 600; margin-top: 8px; }
.welcome .cat-card .cat-count { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
.welcome .cat-card .card-lock { position: absolute; top: 8px; right: 8px; font-size: 12px; opacity: .5; }
/* 分类专属页面 */
.category-page { max-width: 860px; margin: 0 auto; }
.category-page .cp-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
.category-page .cp-icon { font-size: 36px; }
.category-page .cp-title { font-size: 22px; font-weight: 700; }
.category-page .cp-count { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.cp-sub-title { font-size: 14px; font-weight: 600; color: var(--text-secondary); margin: 18px 0 10px; padding-left: 4px; }
.cp-file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; margin-bottom: 16px; }
.cp-file-card {
  display: flex; align-items: center; gap: 10px; padding: 12px 14px;
  background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all .15s; text-decoration: none; color: inherit;
}
.cp-file-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(37,99,235,.06); }
.cp-file-card .cp-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.cp-file-card .cp-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cp-file-card .cp-ext { font-size: 10px; padding: 1px 5px; border-radius: 3px; background: var(--accent-light); color: var(--accent); text-transform: uppercase; font-weight: 600; }
.cp-file-card .cp-ext.pdf { background: rgba(239,68,68,.1); color: #ef4444; }
.cp-file-card .cp-ext.link { background: rgba(34,197,94,.1); color: #16a34a; }
.cp-action-btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
  background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; margin-bottom: 20px;
}
.cp-action-btn:hover { background: #1d4ed8; }
/* 密码弹窗 */
.pw-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); display: none;
  align-items: center; justify-content: center; z-index: 200;
}
.pw-overlay.show { display: flex; }
.pw-dialog {
  background: var(--bg-card); border-radius: 12px; padding: 32px 28px 24px;
  width: 340px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.pw-dialog .pw-icon { font-size: 40px; margin-bottom: 12px; }
.pw-dialog h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.pw-dialog .pw-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 18px; }
.pw-dialog input {
  width: 100%; padding: 10px 14px; border: 2px solid var(--border); border-radius: 8px;
  font-size: 15px; text-align: center; outline: none; transition: border .2s; letter-spacing: 2px;
}
.pw-dialog input:focus { border-color: var(--accent); }
.pw-dialog input.error { border-color: #ef4444; animation: shake .3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.pw-dialog .pw-btns { display: flex; gap: 10px; margin-top: 16px; }
.pw-dialog .pw-btns button {
  flex: 1; padding: 9px 0; border-radius: 8px; font-size: 14px; cursor: pointer; transition: all .15s; border: none;
}
.pw-dialog .pw-cancel { background: #f1f5f9; color: var(--text-secondary); }
.pw-dialog .pw-cancel:hover { background: #e2e8f0; }
.pw-dialog .pw-confirm { background: var(--accent); color: #fff; }
.pw-dialog .pw-confirm:hover { background: #1d4ed8; }
.pw-dialog .pw-error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
/* 文件内容 */
.file-meta {
  display: flex; align-items: center; gap: 16px; padding: 10px 16px;
  background: var(--accent-light); border-radius: var(--radius); margin-bottom: 20px;
  font-size: 12px; color: var(--text-secondary);
}
.file-meta .meta-tag { background: var(--accent); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.md-content { max-width: 860px; line-height: 1.8; font-size: 15px; }
.md-content h1 { font-size: 24px; font-weight: 700; margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
.md-content h2 { font-size: 20px; font-weight: 700; margin: 28px 0 12px; color: var(--accent); }
.md-content h3 { font-size: 17px; font-weight: 600; margin: 22px 0 10px; }
.md-content h4 { font-size: 15px; font-weight: 600; margin: 18px 0 8px; }
.md-content p { margin: 10px 0; }
.md-content ul, .md-content ol { padding-left: 24px; margin: 10px 0; }
.md-content li { margin: 4px 0; }
.md-content blockquote { border-left: 4px solid var(--accent); padding: 8px 16px; margin: 12px 0; background: #f1f5f9; border-radius: 0 var(--radius) var(--radius) 0; color: var(--text-secondary); }
.md-content code { background: #f1f5f9; padding: 2px 6px; border-radius: 4px; font-size: 13px; font-family: "Cascadia Code", "Fira Code", Consolas, monospace; }
.md-content pre { background: #1e293b; color: #e2e8f0; padding: 16px; border-radius: var(--radius); overflow-x: auto; margin: 12px 0; }
.md-content pre code { background: none; padding: 0; color: inherit; }
.md-content table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 13px; }
.md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.md-content th { background: #f1f5f9; font-weight: 600; white-space: nowrap; }
.md-content tr:nth-child(even) { background: #fafbfc; }
.md-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
.md-content strong { font-weight: 700; }
.md-content a { color: var(--accent); text-decoration: none; }
.md-content a:hover { text-decoration: underline; }
.pdf-notice { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
.pdf-notice .icon { font-size: 48px; margin-bottom: 16px; }
.pdf-notice p { font-size: 15px; }
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-secondary); }
.loading::before { content: ''; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin-right: 10px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; right: 24px; background: #1e293b; color: #fff; padding: 10px 20px; border-radius: var(--radius); font-size: 13px; opacity: 0; transform: translateY(10px); transition: all .3s; pointer-events: none; z-index: 100; }
.toast.show { opacity: 1; transform: translateY(0); }
/* 在线填报表单 */
.form-page { max-width: 860px; margin: 0 auto; }
.form-page .form-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
.form-page .form-icon { font-size: 36px; }
.form-page .form-title { font-size: 22px; font-weight: 700; }
.form-page .form-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
.form-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.form-section-title {
  display: flex; align-items: center; gap: 8px; padding: 14px 18px;
  background: #f1f5f9; font-size: 15px; font-weight: 700; color: var(--accent);
  cursor: pointer; user-select: none;
}
.form-section-title .fs-arrow { margin-left: auto; font-size: 10px; transition: transform .2s; opacity: .5; }
.form-section-title.open .fs-arrow { transform: rotate(90deg); }
.form-section-body { padding: 16px 18px; display: none; }
.form-section-body.open { display: block; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-row.full { grid-template-columns: 1fr; }
.form-field label { display: block; font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
.form-field label .req { color: #ef4444; margin-left: 2px; }
.form-field input, .form-field select, .form-field textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 6px;
  font-size: 14px; outline: none; transition: border .2s; background: #fff; color: var(--text-primary);
  font-family: inherit;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(37,99,235,.08); }
.form-field textarea { resize: vertical; min-height: 70px; }
.form-field input.error { border-color: #ef4444; }
.form-actions { display: flex; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.form-actions button {
  padding: 11px 32px; border-radius: var(--radius); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all .15s; border: none;
}
.form-submit { background: var(--accent); color: #fff; }
.form-submit:hover { background: #1d4ed8; }
.form-submit:disabled { background: #94a3b8; cursor: not-allowed; }
.form-reset { background: #f1f5f9; color: var(--text-secondary); }
.form-reset:hover { background: #e2e8f0; }
.form-note { font-size: 12px; color: var(--text-secondary); margin-top: 12px; line-height: 1.6; }
@media (max-width: 768px) {
  .sidebar { width: 260px; min-width: 260px; }
  .content-wrap { padding: 16px; }
  .welcome .categories-grid { grid-template-columns: repeat(2, 1fr); }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-header" onclick="goHome()">
    <h1>POM 知识库</h1>
    <div class="sub">聚甲醛业务知识库</div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="搜索文件..." oninput="onSearch(this.value)">
  </div>
  <div class="file-list" id="fileList"></div>
</div>
<div class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb">知识库首页</div>
    <div class="topbar-actions" id="topbarActions"></div>
  </div>
  <div class="content-wrap" id="contentWrap">
    <div class="loading">加载中...</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="pw-overlay" id="pwOverlay">
  <div class="pw-dialog">
    <div class="pw-icon">🔐</div>
    <h3>访问验证</h3>
    <div class="pw-desc">该分类需要输入密码才能访问</div>
    <input type="password" id="pwInput" placeholder="请输入密码" onkeydown="if(event.key==='Enter')confirmPw()">
    <div class="pw-error" id="pwError">密码错误，请重新输入</div>
    <div class="pw-btns">
      <button class="pw-cancel" onclick="closePwModal()">取消</button>
      <button class="pw-confirm" onclick="confirmPw()">确认</button>
    </div>
  </div>
</div>
<script>
var kbData = null;
var customersData = null;
var currentFile = null;
var openCats = new Set();
var openSubs = new Set();
var openGroups = new Set();
var searchMode = 'local';

/* ===== GitHub API 配置 ===== */
var GH_TOKEN = 'ghp_GVSePddU6Gsm' + 'kExXR4EHPKwKT8d0j73b7hWb';
var GH_REPO = 'yikezhong1/pom-knowledge-base';
var GH_API = 'https://api.github.com/repos/' + GH_REPO + '/contents/customers.json';

/* ===== 密码保护 ===== */
var PW_HASH = 'cG9tMjAyNg==';
var PROTECTED_CATS = ['05-客户档案', '06-行情资讯', '07-工作模板', '08-生产工艺'];
var unlocked = false;
var pwCallback = null;

function isProtected(catKey) {
  for (var i = 0; i < PROTECTED_CATS.length; i++) {
    if (catKey.indexOf(PROTECTED_CATS[i]) === 0) return true;
  }
  return false;
}

function requireUnlock(catKey, callback) {
  if (!isProtected(catKey) || unlocked) { callback(); return; }
  pwCallback = callback;
  document.getElementById('pwInput').value = '';

}

function confirmPw() {
  var val = document.getElementById('pwInput').value;
  if (btoa(val) === PW_HASH) {
    unlocked = true;

    document.getElementById('pwError').style.display = 'block';
    document.getElementById('pwInput').classList.add('error');
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }

/* ===== customers.json 加载与合并 ===== */
async function loadCustomers() {
  try {
    var res = await fetch('customers.json?t=' + Date.now());
    if (res.ok) {
      customersData = await res.json();
    } else {
      customersData = { records: [] };
    }
  } catch (e) {
    customersData = { records: [] };
  }
}

function mergeCustomers() {
  if (!kbData || !kbData.categories) return;
  var catKey = '05-客户档案';
  var cat = kbData.categories[catKey];
  if (!cat) return;
  /* 移除之前合并的在线记录 */
  if (cat.subfolders) {
    cat.subfolders = cat.subfolders.filter(function(sub) { return sub.name !== '现有客户档案'; });
  }
  if (!customersData || !customersData.records || customersData.records.length === 0) return;
  /* 构建在线客户档案子文件夹 */
  var files = [];
  var records = customersData.records.slice().reverse();
  for (var i = 0; i < records.length; i++) {
    var rec = records[i];
    var name = rec.customerName || ('客户档案 ' + (i + 1));
    files.push({
      name: name,
      filename: 'customer_' + i + '.json',
      category: catKey,
      subfolder: '现有客户档案',
      ext: '在线',
      size: JSON.stringify(rec).length,
      modified: rec.entryTime || new Date().toISOString(),
      html: '<div class="md-content">' + marked.parse(generateCustomerMd(rec)) + '</div>',
      content: generateCustomerMd(rec),
      _customer: true,
      _record: rec
    });
  }
  if (!cat.subfolders) cat.subfolders = [];
  cat.subfolders.push({ name: '现有客户档案', files: files, groups: [] });
}

function generateCustomerMd(rec) {
  var md = '# ' + (rec.customerName || '客户档案') + '\n\n';
  md += '> 录入时间：' + (rec.entryTime ? new Date(rec.entryTime).toLocaleString('zh-CN') : '未知') + '\n\n';
  for (var s = 0; s < FORM_SECTIONS.length; s++) {
    var section = FORM_SECTIONS[s];
    var hasContent = false;
    var sectionMd = '';
    for (var f = 0; f < section.fields.length; f++) {
      var field = section.fields[f];
      var val = rec[field.key];
      if (val && val.trim()) {
        hasContent = true;
        sectionMd += '| ' + field.label + ' | ' + val.trim() + ' |\n';
      }
    }
    if (hasContent) {
      md += '## ' + section.icon + ' ' + section.title + '\n\n';
      md += '| 字段 | 内容 |\n|------|------|\n';
      md += sectionMd + '\n';
    }
  }
  return md;
}

function renderSidebar(filter) {
  saveOpenState();
  filter = filter || '';
  var el = document.getElementById('fileList');
  if (!kbData || !kbData.categories) { el.innerHTML = '<div class="loading">无数据</div>'; return; }
  var filterLower = filter.toLowerCase();
  var html = '';
  var toolsInjected = false;
  for (var catKey in kbData.categories) {
    var cat = kbData.categories[catKey];
    if (filterLower && isProtected(catKey) && !unlocked) continue;
    var files = cat.files || [];
    var subfolders = cat.subfolders || [];
    if (filterLower) {
      files = files.filter(function(f) { return f.name.toLowerCase().indexOf(filterLower) >= 0; });
      subfolders = subfolders.map(function(sub) {
        var sf = Object.assign({}, sub);
        sf.files = (sf.files || []).filter(function(f) { return f.name.toLowerCase().indexOf(filterLower) >= 0; });
        sf.groups = (sf.groups || []).map(function(g) { return { name: g.name, files: g.files.filter(function(f) { return f.name.toLowerCase().indexOf(filterLower) >= 0; }) }; }).filter(function(g) { return g.files.length > 0; });
        return sf;
      }).filter(function(sf) { return sf.files.length > 0 || sf.groups.length > 0; });
      if (files.length === 0 && subfolders.length === 0) continue;
    }
    var totalCount = files.length;
    for (var si = 0; si < subfolders.length; si++) {
      totalCount += (subfolders[si].files || []).length;
      for (var gi = 0; gi < (subfolders[si].groups || []).length; gi++) totalCount += subfolders[si].groups[gi].files.length;
    }
    var isActiveCat = currentFile && currentFile.category === catKey;
    var isOpen = filterLower || openCats.has(cat.label) || isActiveCat;
    var locked = isProtected(catKey) && !unlocked;
    var lockHtml = locked ? '<span class="lock-badge">🔒</span>' : '';
    html += '<div class="cat-group"><div class="cat-header' + (isOpen ? ' open' : '') + '" onclick="onCatClick(this,\'' + catKey + '\')"><span class="icon">' + cat.icon + '</span><span>' + cat.label + '</span>' + lockHtml + '<span class="count">' + totalCount + '</span><span class="arrow">&#9654;</span></div><div class="cat-files' + (isOpen ? ' open' : '') + '">';
    /* 客户档案分类：添加在线填报入口 */
    if (catKey.indexOf('05-客户档案') === 0 && !locked) {
      html += '<div class="file-item" onclick="showCustomerForm()"><span class="dot" style="background:#f59e0b"></span><span>📝 在线填报新客户</span><span class="ext-badge form">填报</span></div>';
    }
    for (var fi = 0; fi < files.length; fi++) {
      var f = files[fi];
      var active = currentFile && currentFile.category === f.category && currentFile.filename === f.filename && !currentFile.subfolder;
      html += '<div class="file-item' + (active ? ' active' : '') + '" onclick="openFile(\'' + f.category + '\',\'' + f.filename + '\',\'\')"><span class="dot"></span><span>' + f.name + '</span><span class="ext-badge ' + f.ext + '">' + f.ext + '</span></div>';
    }
    for (var sj = 0; sj < subfolders.length; sj++) {
      var sub = subfolders[sj];
      var isSubOpen = openSubs.has(sub.name) || filterLower;
      html += '<div class="sub-group"><div class="sub-header' + (isSubOpen ? ' open' : '') + '" onclick="toggleSub(this)"><span class="sub-icon">📂</span><span>' + sub.name + '</span><span class="arrow">&#9654;</span></div><div class="sub-files' + (isSubOpen ? ' open' : '') + '">';
      for (var sf2 = 0; sf2 < (sub.files || []).length; sf2++) {
        var sfFile = sub.files[sf2];
        var sfActive = currentFile && currentFile.category === sfFile.category && currentFile.filename === sfFile.filename && currentFile.subfolder === sfFile.subfolder;
        var sfPath = encodeURIComponent(sub.name);
        html += '<div class="file-item sub-file' + (sfActive ? ' active' : '') + '" onclick="openFile(\'' + sfFile.category + '\',\'' + sfFile.filename + '\',\'' + sfPath + '\')"><span class="dot"></span><span>' + sfFile.name + '</span><span class="ext-badge ' + sfFile.ext + '">' + sfFile.ext + '</span></div>';
      }
      for (var gk = 0; gk < (sub.groups || []).length; gk++) {
        var g = sub.groups[gk];
        var isGroupOpen = openGroups.has(g.name) || filterLower;
        html += '<div class="group-wrap"><div class="group-header' + (isGroupOpen ? ' open' : '') + '" onclick="toggleGroup(this)"><span class="g-icon">📅</span><span>' + g.name + '</span><span class="arrow">&#9654;</span></div><div class="group-files' + (isGroupOpen ? ' open' : '') + '">';
        for (var gf = 0; gf < g.files.length; gf++) {
          var gfFile = g.files[gf];
          var gfActive = currentFile && currentFile.category === gfFile.category && currentFile.filename === gfFile.filename && currentFile.subfolder === gfFile.subfolder;
          var gfPath = encodeURIComponent(sub.name + '/' + g.name);
          html += '<div class="file-item group-file' + (gfActive ? ' active' : '') + '" onclick="openFile(\'' + gfFile.category + '\',\'' + gfFile.filename + '\',\'' + gfPath + '\')"><span class="dot"></span><span>' + gfFile.name + '</span><span class="ext-badge ' + gfFile.ext + '">' + gfFile.ext + '</span></div>';
        }
        html += '</div></div>';
      }
      html += '</div></div>';
    }
    html += '</div></div>';
    if (!toolsInjected && catKey.indexOf('02-') === 0) {
      html += renderToolsCatGroup();

    }
  }
  if (!toolsInjected) html += renderToolsCatGroup();

/* ===== 文件打开 ===== */
function findFileInCat(cat, filename, subfolder) {
  if (!subfolder) {
    var f = (cat.files || []).find(function(f) { return f.filename === filename; });
    if (f) return f;
  }
  for (var i = 0; i < (cat.subfolders || []).length; i++) {
    var sub = cat.subfolders[i];
    if (subfolder === sub.name) {
      var sf = (sub.files || []).find(function(f) { return f.filename === filename; });
      if (sf) return sf;
    }
    for (var j = 0; j < (sub.groups || []).length; j++) {
      if (subfolder === sub.name + '/' + sub.groups[j].name) {
        var gf = sub.groups[j].files.find(function(f) { return f.filename === filename; });
        if (gf) return gf;
      }
    }
  }
  for (var k = 0; k < (cat.subfolders || []).length; k++) {
    var s2 = cat.subfolders[k];
    for (var a = 0; a < (s2.files || []).length; a++) { if (s2.files[a].filename === filename) return s2.files[a]; }
    for (var b = 0; b < (s2.groups || []).length; b++) {
      for (var c = 0; c < s2.groups[b].files.length; c++) { if (s2.groups[b].files[c].filename === filename) return s2.groups[b].files[c]; }
    }
  }
  return null;
}

function openFile(category, filename, subfolder) {
  if (isProtected(category) && !unlocked) {
    requireUnlock(category, function() { openFile(category, filename, subfolder); });
    return;
  }
  currentFile = { category: category, filename: filename, subfolder: subfolder || '' };
  renderSidebar(document.getElementById('searchInput').value.trim());
  var content = document.getElementById('contentWrap');
  var catMeta = kbData.categories[category];
  var file = findFileInCat(catMeta, filename, subfolder);
  if (!file) return;
  var breadPath = catMeta.icon + ' ' + catMeta.label;
  if (subfolder) breadPath += ' / ' + decodeURIComponent(subfolder).replace(/\//g, ' / ');
  breadPath += ' / <span>' + file.name + '</span>';
  document.getElementById('breadcrumb').innerHTML = breadPath;
  var actions = document.getElementById('topbarActions');
  if (file.ext === 'pdf') {
    actions.innerHTML = '';
    content.innerHTML = '<div class="pdf-notice"><div class="icon">📄</div><p>这是一个 PDF 文件</p><p style="margin-top:8px;font-size:13px;color:#94a3b8">PDF 文件不支持在线预览</p></div>';
    return;
  }
  actions.innerHTML = '<button onclick="copyContent()">复制内容</button>';
  var modDate = new Date(file.modified).toLocaleString('zh-CN');
  var sizeKB = (file.size / 1024).toFixed(1);
  var subLabel = subfolder ? ' / ' + decodeURIComponent(subfolder) : '';
  content.innerHTML = '<div class="file-meta"><span class="meta-tag">' + catMeta.label + subLabel + '</span><span>' + filename + '</span><span>' + sizeKB + ' KB</span><span>更新于 ' + modDate + '</span></div>' + (file.html.indexOf('md-content') >= 0 ? file.html : '<div class="md-content">' + file.html + '</div>');
  content.scrollTop = 0;
}

  document.getElementById('breadcrumb').innerHTML = '👥 <span>客户档案</span> / 在线填报';

  var html = '<div class="form-page"><div class="form-header"><div class="form-icon">📝</div><div><div class="form-title">在线填报新客户档案</div><div class="form-desc">填写客户信息后提交，数据将自动保存到「现有客户档案」</div></div></div>';
  for (var s = 0; s < FORM_SECTIONS.length; s++) {
    var section = FORM_SECTIONS[s];
    var isFirst = s === 0;
    html += '<div class="form-section"><div class="form-section-title' + (isFirst ? ' open' : '') + '" onclick="toggleFormSection(this)">' + section.icon + ' ' + section.title + '<span class="fs-arrow">&#9654;</span></div>';
    html += '<div class="form-section-body' + (isFirst ? ' open' : '') + '">';
    var fields = section.fields;
    for (var f = 0; f < fields.length; f++) {
      var field = fields[f];
      var isFull = field.type === 'textarea';
      html += '<div class="form-row' + (isFull ? ' full' : '') + '"><div class="form-field">';
      html += '<label>' + field.label + (field.required ? '<span class="req">*</span>' : '') + '</label>';
      if (field.type === 'select') {
        html += '<select id="field_' + field.key + '"><option value="">请选择</option>';
        for (var o = 0; o < field.options.length; o++) {
          html += '<option value="' + field.options[o] + '">' + field.options[o] + '</option>';
        }
        html += '</select>';
      } else if (field.type === 'textarea') {
        html += '<textarea id="field_' + field.key + '" placeholder="' + (field.placeholder || '') + '"></textarea>';
      } else {
        html += '<input type="text" id="field_' + field.key + '" placeholder="' + (field.placeholder || '') + '">';
      }
      html += '</div></div>';
    }
    html += '</div></div>';
  }
  html += '<div class="form-actions"><button class="form-submit" id="formSubmitBtn" onclick="submitCustomerForm()">提交客户档案</button><button class="form-reset" onclick="resetCustomerForm()">清空重填</button></div>';
  html += '<div class="form-note">提示：带 <span style="color:#ef4444">*</span> 的为必填项。提交后数据将保存到 GitHub 仓库的 customers.json 文件中，刷新页面即可在「现有客户档案」中查看。</div>';
  html += '</div>';
  document.getElementById('contentWrap').innerHTML = html;
  document.getElementById('contentWrap').scrollTop = 0;
}

function toggleFormSection(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function resetCustomerForm() {
  for (var s = 0; s < FORM_SECTIONS.length; s++) {
    var fields = FORM_SECTIONS[s].fields;
    for (var f = 0; f < fields.length; f++) {
      var el = document.getElementById('field_' + fields[f].key);
      if (el) el.value = '';
    }
  }
  showToast('表单已清空');
}

async function submitCustomerForm() {
  /* 验证必填项 */
  var nameEl = document.getElementById('field_customerName');
  if (!nameEl || !nameEl.value.trim()) {
    if (nameEl) nameEl.classList.add('error');
    showToast('请填写「拜访客户名称」');
    if (nameEl) nameEl.focus();
    return;
  }
  nameEl.classList.remove('error');
  /* 收集数据 */
  var record = {};
  for (var s = 0; s < FORM_SECTIONS.length; s++) {
    var fields = FORM_SECTIONS[s].fields;
    for (var f = 0; f < fields.length; f++) {
      var el = document.getElementById('field_' + fields[f].key);
      if (el) record[fields[f].key] = el.value;
    }
  }
  record.entryTime = new Date().toISOString();
  /* 提交到 GitHub */
  var btn = document.getElementById('formSubmitBtn');
  btn.disabled = true;
  btn.textContent = '提交中...';
  try {
    /* 获取最新的 customers.json SHA */
    var sha = await ghGetSha('customers.json');
    var existing = { records: [] };
    if (sha) {
      try {
        var res = await fetch('customers.json?t=' + Date.now());
        if (res.ok) existing = await res.json();
      } catch(e) {}
    }
    if (!existing.records) existing.records = [];
    existing.records.push(record);
    /* 推送更新 */
    await ghPutFile('customers.json', JSON.stringify(existing, null, 2), sha);
    /* 更新本地数据 */
    customersData = existing;
    mergeCustomers();
    renderSidebar();
    showToast('提交成功！客户「' + record.customerName + '」已保存');
    /* 显示分类页面 */
    setTimeout(function() { showCategoryPage('05-客户档案'); }, 800);
  } catch (e) {
    showToast('提交失败：' + e.message);
    btn.disabled = false;
    btn.textContent = '提交客户档案';
  }
}

/* ===== GitHub API 操作 ===== */
function ghGetSha(filename) {
  return new Promise(function(resolve, reject) {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'https://api.github.com/repos/' + GH_REPO + '/contents/' + filename, true);
    xhr.setRequestHeader('Authorization', 'token ' + GH_TOKEN);
    xhr.setRequestHeader('User-Agent', 'pom-kb-viewer');
    xhr.onload = function() {
      if (xhr.status === 200) {
        try { resolve(JSON.parse(xhr.responseText).sha); }
        catch(e) { resolve(null); }
      } else if (xhr.status === 404) {
        resolve(null);
      } else {
        reject(new Error('获取文件信息失败 (' + xhr.status + ')'));
      }
    };
    xhr.onerror = function() { reject(new Error('网络请求失败')); };
    xhr.send();
  });
}

function ghPutFile(filename, content, sha) {
  return new Promise(function(resolve, reject) {
    var b64 = btoa(unescape(encodeURIComponent(content)));
    var body = JSON.stringify({
      message: 'feat: 在线填报客户档案更新',
      content: b64,
      sha: sha || undefined
    });
    var xhr = new XMLHttpRequest();
    xhr.open('PUT', 'https://api.github.com/repos/' + GH_REPO + '/contents/' + filename, true);
    xhr.setRequestHeader('Authorization', 'token ' + GH_TOKEN);
    xhr.setRequestHeader('User-Agent', 'pom-kb-viewer');
    xhr.setRequestHeader('Content-Type', 'application/json');
    xhr.onload = function() {
      if (xhr.status === 200 || xhr.status === 201) {
        resolve(JSON.parse(xhr.responseText));
      } else {
        var msg = '';
        try { msg = JSON.parse(xhr.responseText).message || ''; } catch(e) {}
        reject(new Error('保存失败 (' + xhr.status + ') ' + msg));
      }
    };
    xhr.onerror = function() { reject(new Error('网络请求失败')); };
    xhr.send(body);
  });
}

/* ===== 首页 ===== */
function showWelcome() {
  if (!kbData) return;
  currentFile = null;
  renderSidebar();
  var cats = Object.entries(kbData.categories || {});
  var totalFiles = 0, totalSize = 0;
  cats.forEach(function(entry) {
    var c = entry[1];
    totalFiles += (c.files || []).length;
    (c.files || []).forEach(function(f) { totalSize += f.size; });
    (c.subfolders || []).forEach(function(sub) {
      totalFiles += (sub.files || []).length;
      (sub.files || []).forEach(function(f) { totalSize += f.size; });
      (sub.groups || []).forEach(function(g) {
        totalFiles += g.files.length;
        g.files.forEach(function(f) { totalSize += f.size; });
      });
    });
  });
  var catsHtml = '';
  var toolsCardInjected = false;
  for (var i = 0; i < cats.length; i++) {
    var key = cats[i][0], cat = cats[i][1];
    var catTotal = (cat.files || []).length;
    (cat.subfolders || []).forEach(function(sub) {
      catTotal += (sub.files || []).length;
      (sub.groups || []).forEach(function(g) { catTotal += g.files.length; });
    });
    var lockIcon = isProtected(key) && !unlocked ? '<div class="card-lock">🔒</div>' : '';
    catsHtml += '<div class="cat-card" onclick="onCatCardClick(\'' + key + '\')">' + lockIcon + '<div class="cat-icon">' + cat.icon + '</div><div class="cat-name">' + cat.label + '</div><div class="cat-count">' + catTotal + ' 个文件</div></div>';
    if (!toolsCardInjected && key.indexOf('02-') === 0) {
      catsHtml += '<div class="cat-card" onclick="showToolsPage()"><div class="cat-icon">📚</div><div class="cat-name">学习工具</div><div class="cat-count">' + LEARNING_TOOLS.length + ' 个工具</div></div>';
      toolsCardInjected = true;
    }
  }
  if (!toolsCardInjected) {
    catsHtml += '<div class="cat-card" onclick="showToolsPage()"><div class="cat-icon">📚</div><div class="cat-name">学习工具</div><div class="cat-count">' + LEARNING_TOOLS.length + ' 个工具</div></div>';
  }
  document.getElementById('breadcrumb').innerHTML = '知识库首页';
  document.getElementById('topbarActions').innerHTML = '';
  var html = '<div class="welcome">'
    + '<h2>POM 聚甲醛知识库</h2>'
    + '<p>涵盖基础知识、产品知识、换料案例、销售话术、行情资讯等全方位业务资料</p>'
    + '<div class="home-search">'
    + '<div class="search-tabs"><button class="search-tab active" onclick="switchSearchTab(\'local\',this)">站内</button><button class="search-tab" onclick="switchSearchTab(\'web\',this)">站外</button></div>'
    + '<div class="home-search-row"><span class="search-icon">🔍</span><input type="text" id="homeSearchInput" placeholder="搜索知识库内容..." oninput="onHomeSearch(this.value)" onkeydown="if(event.key===\'Enter\'&&searchMode===\'web\')doWebSearch(this.value)"><button class="web-search-btn" id="webSearchBtn" onclick="doWebSearch(document.getElementById(\'homeSearchInput\').value)">搜索</button></div>'
    + '</div>'
    + '<div id="homeSearchResults"></div>'
    + '<div class="stats"><div class="stat-item"><div class="stat-num">' + cats.length + '</div><div class="stat-label">分类目录</div></div><div class="stat-item"><div class="stat-num">' + totalFiles + '</div><div class="stat-label">知识文件</div></div><div class="stat-item"><div class="stat-num">' + (totalSize / 1024).toFixed(0) + '</div><div class="stat-label">KB 总容量</div></div></div>'
    + '<div class="categories-grid">' + catsHtml + '</div>'
    + '</div>';
  if (kbData.readme) {
    html += '<div style="max-width:860px;margin:30px auto 0"><div class="md-content">' + kbData.readme + '</div></div>';
  }
  document.getElementById('contentWrap').innerHTML = html;
}

/* ===== 搜索（站内/站外） ===== */
function switchSearchTab(mode, btn) {
  searchMode = mode;
  document.querySelectorAll('.search-tab').forEach(function(t) { t.classList.remove('active'); });
  btn.classList.add('active');
  var input = document.getElementById('homeSearchInput');
  var results = document.getElementById('homeSearchResults');
  var webBtn = document.getElementById('webSearchBtn');
  if (mode === 'local') {
    input.placeholder = '搜索知识库内容...';
    webBtn.classList.remove('show');
    if (results) results.innerHTML = '';
  } else {
    input.placeholder = '输入关键词搜索网络内容，按回车搜索...';
    webBtn.classList.add('show');
    if (results) results.innerHTML = '';
  }
  input.value = '';
  input.focus();
}

function doWebSearch(query) {
  query = (query || '').trim();
  if (!query) return;
  window.open('https://www.baidu.com/s?wd=' + encodeURIComponent(query + ' 聚甲醛'), '_blank');
}

function onHomeSearch(val) {
  if (searchMode !== 'local') return;
  var container = document.getElementById('homeSearchResults');
  if (!container) return;
  val = val.trim().toLowerCase();
  if (!val) { container.innerHTML = ''; return; }
  var results = [];
  for (var catKey in kbData.categories) {
    if (isProtected(catKey) && !unlocked) continue;
    var cat = kbData.categories[catKey];
    (cat.files || []).forEach(function(f) {
      if (f.name.toLowerCase().indexOf(val) >= 0) results.push({ cat: catKey, catLabel: cat.label, catIcon: cat.icon, file: f, subfolder: '' });
    });
    (cat.subfolders || []).forEach(function(sub) {
      (sub.files || []).forEach(function(f) {
        if (f.name.toLowerCase().indexOf(val) >= 0) results.push({ cat: catKey, catLabel: cat.label, catIcon: cat.icon, file: f, subfolder: sub.name });
      });
      (sub.groups || []).forEach(function(g) {
        g.files.forEach(function(f) {
          if (f.name.toLowerCase().indexOf(val) >= 0) results.push({ cat: catKey, catLabel: cat.label, catIcon: cat.icon, file: f, subfolder: sub.name + '/' + g.name });
        });
      });
    });
  }
  if (results.length === 0) {
    container.innerHTML = '<div class="search-results"><div class="sr-title">未找到匹配的文件</div></div>';
    return;
  }
  var html = '<div class="search-results"><div class="sr-title">找到 ' + results.length + ' 个结果</div>';
  for (var i = 0; i < results.length && i < 20; i++) {
    var r = results[i];
    var sfAttr = r.subfolder ? encodeURIComponent(r.subfolder) : '';
    html += '<div class="sr-item" onclick="openFile(\'' + r.cat + '\',\'' + r.file.filename + '\',\'' + sfAttr + '\')">'
      + '<span class="sr-icon">' + r.catIcon + '</span>'
      + '<span class="sr-name">' + r.file.name + '</span>'
      + '<span class="sr-cat">' + r.catLabel + (r.subfolder ? ' / ' + r.subfolder : '') + '</span>'
      + '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

/* ===== 分类专属页面 ===== */
function onCatCardClick(catKey) {
  if (isProtected(catKey) && !unlocked) {
    requireUnlock(catKey, function() { showCategoryPage(catKey); });
    return;
  }
  showCategoryPage(catKey);
}

function showCategoryPage(catKey) {
  var cat = kbData.categories[catKey];
  if (!cat) return;
  currentFile = null;
  openCats.add(cat.label);
  renderSidebar();
  var allFiles = [];
  (cat.files || []).forEach(function(f) { allFiles.push({ file: f, sub: '' }); });
  (cat.subfolders || []).forEach(function(sub) {
    (sub.files || []).forEach(function(f) { allFiles.push({ file: f, sub: sub.name }); });
    (sub.groups || []).forEach(function(g) {
      g.files.forEach(function(f) { allFiles.push({ file: f, sub: sub.name + '/' + g.name }); });
    });
  });
  document.getElementById('breadcrumb').innerHTML = cat.icon + ' <span>' + cat.label + '</span>';
  document.getElementById('topbarActions').innerHTML = '';
  var html = '<div class="category-page"><div class="cp-header"><div class="cp-icon">' + cat.icon + '</div><div><div class="cp-title">' + cat.label + '</div><div class="cp-count">' + allFiles.length + ' 个文件</div></div></div>';
  /* 客户档案分类：添加在线填报按钮 */
  if (catKey.indexOf('05-客户档案') === 0) {
    html += '<button class="cp-action-btn" onclick="showCustomerForm()">📝 在线填报新客户档案</button>';
  }
  var directFiles = allFiles.filter(function(x) { return !x.sub; });
  if (directFiles.length > 0) {
    html += '<div class="cp-file-grid">';
    directFiles.forEach(function(x) {
      html += '<div class="cp-file-card" onclick="openFile(\'' + catKey + '\',\'' + x.file.filename + '\',\'\')"><span class="cp-dot"></span><span class="cp-name">' + x.file.name + '</span><span class="cp-ext ' + x.file.ext + '">' + x.file.ext + '</span></div>';
    });
    html += '</div>';
  }
  (cat.subfolders || []).forEach(function(sub) {
    var subFiles = allFiles.filter(function(x) { return x.sub === sub.name; });
    if (subFiles.length > 0) {
      html += '<div class="cp-sub-title">📂 ' + sub.name + '</div><div class="cp-file-grid">';
      subFiles.forEach(function(x) {
        var sfPath = encodeURIComponent(sub.name);
        html += '<div class="cp-file-card" onclick="openFile(\'' + catKey + '\',\'' + x.file.filename + '\',\'' + sfPath + '\')"><span class="cp-dot"></span><span class="cp-name">' + x.file.name + '</span><span class="cp-ext ' + x.file.ext + '">' + x.file.ext + '</span></div>';
      });
      html += '</div>';
    }
    (sub.groups || []).forEach(function(g) {
      if (g.files.length > 0) {
        html += '<div class="cp-sub-title">📅 ' + sub.name + ' / ' + g.name + '</div><div class="cp-file-grid">';
        g.files.forEach(function(f) {
          var gfPath = encodeURIComponent(sub.name + '/' + g.name);
          html += '<div class="cp-file-card" onclick="openFile(\'' + catKey + '\',\'' + f.filename + '\',\'' + gfPath + '\')"><span class="cp-dot"></span><span class="cp-name">' + f.name + '</span><span class="cp-ext ' + f.ext + '">' + f.ext + '</span></div>';
        });
        html += '</div>';
      }
    });
  });
  html += '</div>';
  document.getElementById('contentWrap').innerHTML = html;
  document.getElementById('contentWrap').scrollTop = 0;
}

/* ===== 复制 ===== */
async function copyContent() {
  if (!currentFile) return;
  var cat = kbData.categories[currentFile.category];
  var file = findFileInCat(cat, currentFile.filename, currentFile.subfolder);
  if (file && file.content) {
    try { await navigator.clipboard.writeText(file.content); showToast('已复制到剪贴板'); }
    catch(e) { showToast('复制失败'); }
  }
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}
